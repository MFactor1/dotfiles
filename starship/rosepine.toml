# ~/.config/starship.toml


format = """\
[ mnesbitt ](bg:#c4a7e7 fg:#2a273f)\
[Óāį](fg:#c4a7e7 bg:#2a273f)\
$git_branch$git_metrics${custom.nogit}\
[Óāį](fg:#2a273f bg:#e0def4)\
$directory\
[Óāį ](fg:#e0def4 bg:#191724)\
$character
"""

command_timeout = 3000

[directory]
format = "[ $path ]($style)"
style = "fg:#2a273f bg:#e0def4"

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "ÓúČ Ôźė "
style = "fg:#c4a7e7 bg:#2a273f"

[custom.nogit]
when = '[[ ! -d .git && -z "$(git rev-parse --is-inside-work-tree 2>/dev/null)" ]]'
format = '[ zsh ](fg:#c4a7e7 bg:#2a273f)'

[git_status]
format = '[$all_status]($style)'
style = "fg:#1C3A5E bg:#FCF392"

[git_metrics]
format = "([+$added ]($added_style))[]($added_style)"
added_style = "fg:#c4a7e7 bg:#2a273f"
deleted_style = "fg:bright-red bg:235"
disabled = false

[hg_branch]
format = "[ $symbol$branch ]($style)"
symbol = "Ôźė "

[cmd_duration]
format = "[ ÔôŹ $duration ]($style)"
style = "fg:bright-white bg:18"

[character]
success_symbol = '[\$](#A5ADCB)'
#success_symbol = '[Ó≠į](#A5ADCB)'
error_symbol = '[ ‚úó](#E84D44) '

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#2a273f"
format = '[[ zsh ](bg:#2a273f fg:#A5ADCB)]($style)'
